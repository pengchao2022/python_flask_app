name: Flask-app-ci

on:
  pull_request:
    types:
      - closed
    paths:
      - 'app/**'           
      - 'Dockerfile'       
      - 'requirements.txt' 
      - '.github/workflows/flask-ci.yaml'  

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: flask-todo-app

jobs:
  flask-app-build:
    if: |
      github.event.pull_request.merged == true && 
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Determine version from commit messages
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            
            const messages = commits.map(c => c.commit.message).join('\n');
            
            let bumpType = 'PATCH';  // 默认 PATCH
            
            if (messages.includes('MAJOR')) {
              bumpType = 'MAJOR';
            } else if (messages.includes('MINOR')) {
              bumpType = 'MINOR';
            } else {
              bumpType = 'PATCH';  
            }
            
            # get the latest version 
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10
            });
            
            let currentVersion = '0.0.0';
            const semverTag = tags.find(tag => /^v\d+\.\d+\.\d+$/.test(tag.name));
            if (semverTag) {
              currentVersion = semverTag.name.substring(1);
            }
            
            # calculate new version
            const [major, minor, patch] = currentVersion.split('.').map(Number);
            let newVersion;
            
            if (bumpType === 'MAJOR') {
              newVersion = `${major + 1}.0.0`;
            } else if (bumpType === 'MINOR') {
              newVersion = `${major}.${minor + 1}.0`;
            } else {
              newVersion = `${major}.${minor}.${patch + 1}`;
            }
            
            console.log(`Current version: ${currentVersion}`);
            console.log(`Bump type: ${bumpType}`);
            console.log(`New version: ${newVersion}`);
            
            core.setOutput('new_version', newVersion);
            core.setOutput('bump_type', bumpType);

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Create Git tag
        run: |
          git tag v${{ steps.version.outputs.new_version }}
          git push origin v${{ steps.version.outputs.new_version }}