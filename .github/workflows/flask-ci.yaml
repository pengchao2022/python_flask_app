name: Flask-app-ci

on:
  pull_request:
    types:
      - closed
    paths:
      - 'app/**'           
      - 'Dockerfile'       
      - 'requirements.txt' 
      - '.github/workflows/flask-ci.yaml'  

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: flask-todo-app

jobs:
  flask-app-ci:
    if: |
      github.event.pull_request.merged == true && 
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Determine version from commit messages
        id: version
        run: |
          # get PR merged commits
          LAST_TAG=$(git tag -l "v*" | sort -V | tail -n 1 || echo "v0.0.0")
          echo "Last tag: ${LAST_TAG}"
          
          # get all commit messages
          if [ "${LAST_TAG}" = "v0.0.0" ]; then
            COMMIT_MSGS=$(git log --format=%B)
          else
            COMMIT_MSGS=$(git log ${LAST_TAG}..HEAD --format=%B)
          fi
          
          echo "=== Commit Messages ==="
          echo "${COMMIT_MSGS}"
          
          # determine commit type 
          BUMP_TYPE="PATCH"
          
          if echo "${COMMIT_MSGS}" | grep -q "MAJOR"; then
            BUMP_TYPE="MAJOR"
          elif echo "${COMMIT_MSGS}" | grep -q "MINOR"; then
            BUMP_TYPE="MINOR"
          fi
          
          echo "Bump type: ${BUMP_TYPE}"
          echo "bump_type=${BUMP_TYPE}" >> $GITHUB_OUTPUT
          
          # get the current version 
          CURRENT_VERSION=$(echo "${LAST_TAG}" | sed 's/^v//')
          if [ -z "${CURRENT_VERSION}" ]; then
            CURRENT_VERSION="0.0.0"
          fi
          
          echo "Current version: ${CURRENT_VERSION}"
          
          # calculate the new version
          IFS='.' read -r major minor patch <<< "${CURRENT_VERSION}"
          
          if [ "${BUMP_TYPE}" = "MAJOR" ]; then
            NEW_VERSION="$((major + 1)).0.0"
          elif [ "${BUMP_TYPE}" = "MINOR" ]; then
            NEW_VERSION="${major}.$((minor + 1)).0"
          else
            NEW_VERSION="${major}.${minor}.$((patch + 1))"
          fi
          
          echo "New version: ${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            
      - name: Create Git tag
        run: |
          git tag v${{ steps.version.outputs.new_version }}
          git push origin v${{ steps.version.outputs.new_version }}